<!DOCTYPE html><html><head><meta charset="utf-8"><title>Screenshot 01</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;box-sizing:border-box}body{width:1290px;height:2796px;background:#F5F5F0;font-family:'Noto Sans JP',sans-serif;overflow:hidden;padding:120px 80px}
.head{color:#E8B84B;font-size:72px;font-weight:700;text-align:center;margin-top:100px}
.sub{color:#1A1A1A;font-size:36px;text-align:center;margin-top:32px;line-height:1.6;padding:0 40px}
.phone{width:700px;margin:100px auto 0;background:#fff;border-radius:48px;padding:60px 48px;box-shadow:0 20px 80px rgba(0,0,0,0.08)}
.card{background:#fff;border:1px solid #eee;border-radius:20px;padding:36px;margin-bottom:28px}
.ring-wrap{display:flex;justify-content:center;margin-bottom:40px}
.ring{position:relative;width:240px;height:240px}
.ring svg{width:240px;height:240px}
.ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Inter',sans-serif;font-size:56px;font-weight:700;color:#0F3D28}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;text-align:center;margin-top:20px}
.stat-num{font-family:'Inter',sans-serif;font-size:40px;font-weight:700;color:#0F3D28}
.stat-label{font-size:20px;color:#666;margin-top:4px}
.quest{background:#F5F5F0;border-radius:16px;padding:28px;margin-top:28px}
.quest-title{font-size:22px;color:#666;margin-bottom:12px}
.quest-name{font-size:28px;font-weight:700;color:#1A1A1A}
.bar-bg{height:16px;background:#ddd;border-radius:8px;margin-top:16px}
.bar-fill{height:16px;background:#E8B84B;border-radius:8px;width:76%}
.quest-remain{font-size:20px;color:#666;margin-top:8px;text-align:right}
.level{background:#0F3D28;border-radius:16px;padding:24px 28px;margin-top:28px;color:#fff;display:flex;align-items:center;gap:20px}
.lv-emoji{font-size:40px}.lv-text{font-size:24px}.lv-name{font-size:20px;color:#E8B84B}
</style></head><body>
<div class="head">旅を、ゲームにしよう。</div>
<div class="sub">道の駅を巡り、クエストをクリアし、<br>思い出と達成感を積み上げよう</div>
<div class="phone">
  <div class="ring-wrap"><div class="ring">
    <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="#eee" stroke-width="10"/><circle cx="60" cy="60" r="52" fill="none" stroke="#0F3D28" stroke-width="10" stroke-linecap="round" stroke-dasharray="326.7" stroke-dashoffset="251.6" transform="rotate(-90 60 60)"/></svg>
    <div class="ring-pct">23%</div>
  </div></div>
  <div class="stats">
    <div><div class="stat-num">284</div><div class="stat-label">スタンプ</div></div>
    <div><div class="stat-num">947</div><div class="stat-label">残り</div></div>
    <div><div class="stat-num">5</div><div class="stat-label">制覇県</div></div>
  </div>
  <div class="quest">
    <div class="quest-title">次のクエスト</div>
    <div class="quest-name">🎯 300駅の猛者</div>
    <div class="bar-bg"><div class="bar-fill"></div></div>
    <div class="quest-remain">あと16駅</div>
  </div>
  <div class="level"><span class="lv-emoji">⭐</span><div><div class="lv-text">Lv.4</div><div class="lv-name">スタンプ収集家</div></div></div>
</div>
</body></html>
