<!DOCTYPE html><html><head><meta charset="utf-8"><title>Screenshot 02</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;box-sizing:border-box}body{width:1290px;height:2796px;background:#F5F5F0;font-family:'Noto Sans JP',sans-serif;overflow:hidden;padding:120px 80px}
.head{color:#E8B84B;font-size:64px;font-weight:700;text-align:center;margin-top:100px}
.phone{width:700px;margin:80px auto 0;background:#fff;border-radius:48px;padding:60px 48px;box-shadow:0 20px 80px rgba(0,0,0,0.08)}
.q{border-radius:20px;padding:36px;margin-bottom:24px;display:flex;align-items:center;gap:24px}
.q-done{background:linear-gradient(135deg,#FFF8E1,#FFF3C4);border:2px solid #E8B84B}
.q-progress{background:#fff;border:2px solid #ddd}
.q-locked{background:#f5f5f5;border:2px solid #eee;opacity:0.7}
.q-icon{font-size:48px;flex-shrink:0}
.q-body{flex:1}
.q-name{font-size:28px;font-weight:700;color:#1A1A1A}
.q-desc{font-size:20px;color:#666;margin-top:6px}
.q-badge{font-size:18px;color:#E8B84B;font-weight:700;margin-top:8px}
.q-badge-locked{color:#999}
.bar-bg{height:12px;background:#eee;border-radius:6px;margin-top:12px}
.bar-fill{height:12px;background:#4CAF50;border-radius:6px}
.q-remain{font-size:18px;color:#666;margin-top:6px}
.check{color:#E8B84B;font-size:36px;font-weight:700}
</style></head><body>
<div class="head">クエストをクリアして<br>称号を獲得</div>
<div class="phone">
  <div class="q q-done"><div class="q-icon">🎯</div><div class="q-body"><div class="q-name">旅のはじまり</div><div class="q-desc">初めての道の駅を訪問</div><div class="q-badge">称号: 旅ビギナー</div></div><div class="check">✓</div></div>
  <div class="q q-done"><div class="q-icon">⭐</div><div class="q-body"><div class="q-name">10駅の旅人</div><div class="q-desc">累計10駅を訪問</div><div class="q-badge">称号: スタンプ収集家</div></div><div class="check">✓</div></div>
  <div class="q q-progress"><div class="q-icon">🔒</div><div class="q-body"><div class="q-name">50駅の冒険者</div><div class="q-desc">累計50駅を訪問</div><div class="bar-bg"><div class="bar-fill" style="width:76%"></div></div><div class="q-remain">38 / 50（あと12駅）</div></div></div>
  <div class="q q-locked"><div class="q-icon">🔒</div><div class="q-body"><div class="q-name">100駅の探検家</div><div class="q-desc">累計100駅を訪問</div><div class="q-badge q-badge-locked">称号: 百駅探検家</div></div></div>
  <div class="q q-locked"><div class="q-icon">🔒</div><div class="q-body"><div class="q-name">300駅の猛者</div><div class="q-desc">累計300駅を訪問</div><div class="q-badge q-badge-locked">称号: 旅の猛者</div></div></div>
  <div class="q q-locked"><div class="q-icon">🔒</div><div class="q-body"><div class="q-name">全国制覇</div><div class="q-desc">1231駅すべて訪問</div><div class="q-badge q-badge-locked">称号: レジェンド旅人</div></div></div>
</div>
</body></html>
