<!DOCTYPE html><html><head><meta charset="utf-8"><title>Screenshot 04</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;box-sizing:border-box}body{width:1290px;height:2796px;background:#F5F5F0;font-family:'Noto Sans JP',sans-serif;overflow:hidden;padding:120px 80px}
.head{color:#E8B84B;font-size:64px;font-weight:700;text-align:center;margin-top:80px}
.phone{width:750px;margin:60px auto 0;background:#fff;border-radius:48px;padding:48px;box-shadow:0 20px 80px rgba(0,0,0,0.08)}
.map-title{font-size:32px;font-weight:700;text-align:center;margin-bottom:24px}
.map-summary{text-align:center;color:#666;font-size:22px;margin-bottom:32px}
.map{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;padding:16px}
.pref{border-radius:8px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.2)}
.pref-done{background:#E8B84B}
.pref-visit{background:#4CAF50}
.pref-none{background:#CCCCCC;color:#999;text-shadow:none}
.legend{display:flex;justify-content:center;gap:40px;margin-top:24px}
.leg{display:flex;align-items:center;gap:8px;font-size:20px;color:#666}
.leg-dot{width:20px;height:20px;border-radius:4px}
</style></head><body>
<div class="head">全国1231駅を<br>地図で制覇</div>
<div class="phone">
  <div class="map-title">🗾 全国制覇マップ</div>
  <div class="map-summary">制覇 5県 / 訪問中 12県 / 未訪問 30県</div>
  <div class="map">
    <div class="pref pref-visit">北海道</div><div class="pref pref-none">青森</div><div class="pref pref-none">岩手</div><div class="pref pref-visit">宮城</div><div class="pref pref-none">秋田</div><div class="pref pref-none">山形</div><div class="pref pref-visit">福島</div><div class="pref pref-visit">茨城</div>
    <div class="pref pref-none">栃木</div><div class="pref pref-visit">群馬</div><div class="pref pref-visit">埼玉</div><div class="pref pref-done">千葉</div><div class="pref pref-done">東京</div><div class="pref pref-visit">神奈川</div><div class="pref pref-none">新潟</div><div class="pref pref-none">富山</div>
    <div class="pref pref-none">石川</div><div class="pref pref-none">福井</div><div class="pref pref-visit">山梨</div><div class="pref pref-visit">長野</div><div class="pref pref-visit">岐阜</div><div class="pref pref-done">静岡</div><div class="pref pref-done">愛知</div><div class="pref pref-visit">三重</div>
    <div class="pref pref-none">滋賀</div><div class="pref pref-visit">京都</div><div class="pref pref-none">大阪</div><div class="pref pref-none">兵庫</div><div class="pref pref-none">奈良</div><div class="pref pref-none">和歌山</div><div class="pref pref-none">鳥取</div><div class="pref pref-none">島根</div>
    <div class="pref pref-none">岡山</div><div class="pref pref-none">広島</div><div class="pref pref-none">山口</div><div class="pref pref-none">徳島</div><div class="pref pref-none">香川</div><div class="pref pref-none">愛媛</div><div class="pref pref-none">高知</div><div class="pref pref-none">福岡</div>
    <div class="pref pref-none">佐賀</div><div class="pref pref-none">長崎</div><div class="pref pref-none">熊本</div><div class="pref pref-none">大分</div><div class="pref pref-none">宮崎</div><div class="pref pref-done">鹿児島</div><div class="pref pref-none">沖縄</div><div></div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#E8B84B"></div>制覇</div>
    <div class="leg"><div class="leg-dot" style="background:#4CAF50"></div>訪問中</div>
    <div class="leg"><div class="leg-dot" style="background:#CCC"></div>未訪問</div>
  </div>
</div>
</body></html>
