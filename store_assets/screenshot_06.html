<!DOCTYPE html><html><head><meta charset="utf-8"><title>Screenshot 06</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;box-sizing:border-box}body{width:1290px;height:2796px;background:#F5F5F0;font-family:'Noto Sans JP',sans-serif;overflow:hidden;padding:120px 80px}
.head{color:#E8B84B;font-size:58px;font-weight:700;text-align:center;margin-top:80px;line-height:1.4}
.phone{width:750px;margin:60px auto 0;background:#fff;border-radius:48px;padding:60px 48px;box-shadow:0 20px 80px rgba(0,0,0,0.08)}
.level-card{background:linear-gradient(135deg,#0F3D28,#1A5C3A);border-radius:24px;padding:48px;color:#fff;text-align:center;margin-bottom:32px}
.level-emoji{font-size:72px;margin-bottom:16px}
.level-name{font-size:36px;font-weight:700}
.level-title{font-size:24px;color:#E8B84B;margin-top:8px}
.xp-wrap{margin-top:24px}
.xp-label{display:flex;justify-content:space-between;font-size:18px;color:rgba(255,255,255,0.6);margin-bottom:8px}
.xp-bar{height:16px;background:rgba(255,255,255,0.15);border-radius:8px}
.xp-fill{height:16px;background:#E8B84B;border-radius:8px;width:68%}
.xp-next{font-size:18px;color:rgba(255,255,255,0.5);margin-top:8px}
.section-title{font-size:28px;font-weight:700;color:#1A1A1A;margin:32px 0 16px}
.rank{display:flex;align-items:center;gap:20px;padding:20px;border-radius:16px;margin-bottom:12px}
.rank-me{background:linear-gradient(135deg,#FFF8E1,#FFF3C4);border:2px solid #E8B84B}
.rank-other{background:#f8f8f8}
.rank-pos{font-family:'Inter',sans-serif;font-size:32px;font-weight:700;width:48px;text-align:center}
.rank-pos-gold{color:#E8B84B}
.rank-pos-silver{color:#999}
.rank-info{flex:1}
.rank-name{font-size:24px;font-weight:700;color:#1A1A1A}
.rank-detail{font-size:18px;color:#666;margin-top:2px}
.rank-count{font-family:'Inter',sans-serif;font-size:28px;font-weight:700;color:#0F3D28}
.badges-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px}
.badge{background:#fff;border:2px solid #eee;border-radius:16px;padding:16px;text-align:center;width:120px}
.badge-done{border-color:#E8B84B;background:#FFFDF5}
.badge-emoji{font-size:36px}
.badge-name{font-size:16px;color:#666;margin-top:4px}
</style></head><body>
<div class="head">旅人レベルが上がるたびに<br>旅が楽しくなる</div>
<div class="phone">
  <div class="level-card">
    <div class="level-emoji">⭐</div>
    <div class="level-name">Lv.4</div>
    <div class="level-title">スタンプ収集家</div>
    <div class="xp-wrap">
      <div class="xp-label"><span>経験値</span><span>284 / 500 XP</span></div>
      <div class="xp-bar"><div class="xp-fill"></div></div>
      <div class="xp-next">次のレベルまで 216 XP</div>
    </div>
  </div>
  <div class="section-title">🏅 ランキング</div>
  <div class="rank rank-other"><div class="rank-pos rank-pos-gold">1</div><div class="rank-info"><div class="rank-name">旅の達人</div><div class="rank-detail">Lv.8 道の駅マスター</div></div><div class="rank-count">892駅</div></div>
  <div class="rank rank-other"><div class="rank-pos rank-pos-silver">2</div><div class="rank-info"><div class="rank-name">全国巡礼者</div><div class="rank-detail">Lv.7 探検家</div></div><div class="rank-count">645駅</div></div>
  <div class="rank rank-me"><div class="rank-pos rank-pos-gold">3</div><div class="rank-info"><div class="rank-name">あなた</div><div class="rank-detail">Lv.4 スタンプ収集家</div></div><div class="rank-count">284駅</div></div>
  <div class="section-title">🎖️ 獲得済み称号</div>
  <div class="badges-row">
    <div class="badge badge-done"><div class="badge-emoji">🎯</div><div class="badge-name">旅ビギナー</div></div>
    <div class="badge badge-done"><div class="badge-emoji">⭐</div><div class="badge-name">10駅の旅人</div></div>
    <div class="badge badge-done"><div class="badge-emoji">🌟</div><div class="badge-name">50駅冒険者</div></div>
    <div class="badge badge-done"><div class="badge-emoji">💫</div><div class="badge-name">百駅探検家</div></div>
    <div class="badge"><div class="badge-emoji">🔒</div><div class="badge-name">300駅の猛者</div></div>
  </div>
</div>
</body></html>
