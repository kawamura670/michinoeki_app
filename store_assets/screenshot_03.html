<!DOCTYPE html><html><head><meta charset="utf-8"><title>Screenshot 03</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;box-sizing:border-box}body{width:1290px;height:2796px;background:#F5F5F0;font-family:'Noto Sans JP',sans-serif;overflow:hidden;padding:120px 80px}
.head{color:#E8B84B;font-size:64px;font-weight:700;text-align:center;margin-top:100px}
.cert-wrap{width:800px;margin:80px auto 0}
.cert{background:#0F3D28;border-radius:32px;padding:80px 60px;text-align:center;position:relative;overflow:hidden}
.cert::before{content:'';position:absolute;inset:16px;border:3px solid #E8B84B;border-radius:24px;pointer-events:none}
.cert::after{content:'';position:absolute;inset:24px;border:1px solid rgba(232,184,75,0.3);border-radius:20px;pointer-events:none}
.cert-crown{font-size:80px;margin-bottom:20px}
.cert-label{color:#E8B84B;font-size:28px;letter-spacing:4px;margin-bottom:24px}
.cert-title{color:#fff;font-size:72px;font-weight:700;margin-bottom:16px}
.cert-sub{color:rgba(255,255,255,0.7);font-size:28px;margin-bottom:40px}
.cert-detail{display:flex;justify-content:center;gap:60px;margin-bottom:40px}
.cert-item{text-align:center}
.cert-item-label{color:rgba(255,255,255,0.5);font-size:20px}
.cert-item-value{color:#E8B84B;font-size:32px;font-weight:700;font-family:'Inter',sans-serif;margin-top:8px}
.cert-logo{color:rgba(255,255,255,0.4);font-size:24px;margin-top:40px}
.cert-divider{width:120px;height:2px;background:#E8B84B;margin:0 auto 40px;opacity:0.5}
.share-row{display:flex;justify-content:center;gap:24px;margin-top:60px}
.share-btn{background:#E8B84B;color:#0F3D28;border:none;border-radius:16px;padding:24px 48px;font-size:28px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.share-btn-outline{background:transparent;color:#666;border:2px solid #ddd;border-radius:16px;padding:24px 48px;font-size:28px;font-family:'Noto Sans JP',sans-serif}
</style></head><body>
<div class="head">制覇証明書を<br>SNSでシェアしよう</div>
<div class="cert-wrap">
  <div class="cert">
    <div class="cert-crown">🏆</div>
    <div class="cert-label">CERTIFICATE OF COMPLETION</div>
    <div class="cert-title">愛知県 制覇</div>
    <div class="cert-sub">全ての道の駅を訪問しました</div>
    <div class="cert-divider"></div>
    <div class="cert-detail">
      <div class="cert-item"><div class="cert-item-label">達成日</div><div class="cert-item-value">2024.03.15</div></div>
      <div class="cert-item"><div class="cert-item-label">達成駅数</div><div class="cert-item-value">17駅</div></div>
      <div class="cert-item"><div class="cert-item-label">旅人レベル</div><div class="cert-item-value">Lv.6</div></div>
    </div>
    <div class="cert-logo">タビクエ — TabiQue</div>
  </div>
  <div class="share-row">
    <button class="share-btn">📤 シェアする</button>
    <button class="share-btn-outline">💾 保存する</button>
  </div>
</div>
</body></html>
