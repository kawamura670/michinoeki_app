<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B7A4E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="description" content="全国の道の駅を巡る旅の記録。チェックするたび、ご当地の宝が現れる。">
<title>道の駅スタンプ帳</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== ナビゲーションバー ===== -->
<nav class="nav-bar">
  <span class="nav-title">道の駅スタンプ帳</span>
  <button id="share-btn" class="nav-icon" title="シェア">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
  </button>
</nav>

<!-- ===== ホームタブ ===== -->
<div id="tab-home" class="tab-content active">
  <div class="home-container">

    <!-- 達成率カード -->
    <div class="hero-card">
      <div class="hero-label">全国達成率</div>
      <div class="hero-ring-wrap">
        <svg class="hero-ring" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="52" fill="none" stroke="#e8e8e8" stroke-width="10"/>
          <circle id="hero-ring-fill" cx="60" cy="60" r="52" fill="none" stroke="#1B7A4E" stroke-width="10" stroke-linecap="round" stroke-dasharray="326.7" stroke-dashoffset="326.7" transform="rotate(-90 60 60)"/>
        </svg>
        <div class="hero-pct" id="hero-pct">0%</div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat"><span class="hero-stat-num" id="hero-visited">0</span><span class="hero-stat-label">訪問済み</span></div>
        <div class="hero-stat-divider"></div>
        <div class="hero-stat"><span class="hero-stat-num" id="hero-remaining">0</span><span class="hero-stat-label">残り</span></div>
        <div class="hero-stat-divider"></div>
        <div class="hero-stat"><span class="hero-stat-num" id="hero-pref-complete">0</span><span class="hero-stat-label">制覇県</span></div>
      </div>
    </div>

    <!-- レベル -->
    <div id="level-card" class="level-card"></div>

    <!-- 最新訪問 -->
    <div class="section-header">最近の訪問</div>
    <div id="home-recent" class="home-recent"></div>

    <!-- もうすぐ制覇 -->
    <div id="almost-section"></div>

    <!-- アクションボタン -->
    <div class="home-actions">
      <button id="open-stamp-btn" class="action-btn primary-btn">📷 スタンプを記録</button>
      <button id="voice-btn" class="action-btn secondary-btn">🎤 声でチェック</button>
    </div>

    <div class="home-actions sub-actions">
      <button id="export-btn" class="text-btn">💾 バックアップ</button>
      <button id="import-btn" class="text-btn">📂 読み込み</button>
      <input type="file" id="import-file" accept="application/json" hidden>
    </div>
  </div>
</div>

<!-- ===== 一覧タブ ===== -->
<div id="tab-list" class="tab-content">
  <div class="list-container">
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="道の駅名・地名で検索">
    </div>
    <div class="filter-row">
      <button class="filter-chip active" data-filter="all">すべて</button>
      <button class="filter-chip" data-filter="visited">訪問済み</button>
      <button class="filter-chip" data-filter="unvisited">未訪問</button>
    </div>
    <main id="pref-list"></main>
  </div>
</div>

<!-- ===== 統計タブ ===== -->
<div id="tab-stats" class="tab-content">
  <div class="stats-container">
    <div class="section-header">地方別の進捗</div>
    <div id="region-stats" class="region-stats"></div>
    <div class="section-header" style="margin-top:28px">最近の訪問</div>
    <div id="recent-visits" class="recent-visits"></div>
  </div>
</div>

<!-- ===== 実績タブ ===== -->
<div id="tab-badges" class="tab-content">
  <div class="badges-container">
    <div class="section-header">実績バッジ</div>
    <div id="badge-list" class="badge-list"></div>
  </div>
</div>

<!-- ===== 下部タブバー（iOS風） ===== -->
<div class="bottom-tab-bar">
  <button class="btab active" data-tab="home">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    <span>ホーム</span>
  </button>
  <button class="btab" data-tab="list">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>一覧</span>
  </button>
  <button class="btab" data-tab="stats">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>統計</span>
  </button>
  <button class="btab" data-tab="badges">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
    <span>実績</span>
  </button>
</div>

<!-- ===== 特産物トースト ===== -->

<!-- ===== スタンプ記録モーダル ===== -->
<div id="stamp-modal" class="modal-overlay" hidden>
  <div class="modal">
    <h2>📷 スタンプを記録</h2>
    <input type="file" id="stamp-photo" accept="image/*" capture="environment">
    <img id="stamp-preview" hidden>
    <input type="text" id="stamp-search" placeholder="道の駅名で検索して選択">
    <div id="stamp-results" class="stamp-results"></div>
    <div id="stamp-selected" class="stamp-selected"></div>
    <div class="modal-actions">
      <button id="stamp-cancel" class="modal-cancel">キャンセル</button>
      <button id="stamp-confirm" class="modal-confirm" disabled>記録する</button>
    </div>
  </div>
</div>

<!-- ===== 音声チェックモーダル ===== -->
<div id="voice-modal" class="modal-overlay" hidden>
  <div class="modal voice-modal">
    <h2>🎤 音声でチェック</h2>
    <div id="voice-status" class="voice-status">マイクボタンを押して道の駅名を読み上げてください</div>
    <div id="voice-recognized" class="voice-recognized"></div>
    <div id="voice-matches" class="voice-matches"></div>
    <div id="voice-done-msg" class="voice-done-msg" hidden></div>
    <div class="modal-actions">
      <button id="voice-mic" class="voice-mic-btn">🎤 聴き取り開始</button>
      <button id="voice-close" class="modal-cancel">閉じる</button>
    </div>
  </div>
</div>

<!-- ===== シェアモーダル ===== -->
<div id="share-modal" class="modal-overlay" hidden>
  <div class="modal">
    <h2>進捗をシェア</h2>
    <div id="share-card" class="share-card"></div>
    <div class="modal-actions">
      <button id="share-close" class="modal-cancel">閉じる</button>
      <button id="share-copy" class="modal-confirm">📋 コピー</button>
    </div>
  </div>
</div>

<!-- ===== バッジポップアップ ===== -->

<!-- ===== 紙吹雪コンテナ ===== -->

<script src="data.js"></script>
<script src="progress.js"></script>
<script src="app.js"></script>
</body>
</html>
