<!-- @dsCard group="プレミアム" -->
<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プレミアムUI</title>
<style>
  :root { --primary:#1A6B4A; --primary-pale:#E6F3EC; --gold:#D4941F; --text:#1A1A1A; --text-sub:#7A7A80; --border:#EAEAE8; --bg:#FAFAF8; --card:#FFFFFF; --radius:18px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,"Hiragino Sans",sans-serif; background: var(--bg); padding: 20px; max-width: 380px; margin: 0 auto; }
  h3 { font-size: 11px; font-weight: 700; color: #A8A8B0; letter-spacing: 0.1em; margin: 24px 0 10px; }
  h3:first-child { margin-top: 0; }

  .premium-banner {
    background: linear-gradient(135deg, #2C1810, #4A3020, #2C1810);
    border-radius: 16px; padding: 14px 18px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 4px 16px rgba(44,24,16,0.3); position: relative; overflow: hidden;
  }
  .premium-banner-icon { font-size: 1.6rem; position: relative; z-index: 1; }
  .premium-banner-text { flex: 1; position: relative; z-index: 1; }
  .premium-banner-title { color: #E8A735; font-weight: 800; font-size: 0.88rem; }
  .premium-banner-sub { color: rgba(255,255,255,0.5); font-size: 0.72rem; margin-top: 2px; }

  .premium-nudge {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: var(--radius); padding: 16px;
    position: relative; overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .premium-nudge::before { content:''; position:absolute; top:-60%; right:-20%; width:160px; height:160px; border-radius:50%; background:radial-gradient(circle,rgba(232,167,53,0.15),transparent 70%); }
  .premium-nudge-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; position: relative; z-index: 1; }
  .premium-nudge-map { width: 52px; height: 52px; border-radius: 10px; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
  .premium-nudge-title { color: #E8A735; font-size: 0.88rem; font-weight: 800; display: flex; align-items: center; gap: 6px; }
  .premium-nudge-sub { color: rgba(255,255,255,0.65); font-size: 0.78rem; margin-top: 3px; line-height: 1.4; }
  .premium-nudge-features { display: flex; gap: 6px; flex-wrap: wrap; position: relative; z-index: 1; }
  .premium-nudge-feat { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75); font-size: 0.7rem; font-weight: 600; padding: 4px 8px; border-radius: 6px; white-space: nowrap; }
  .premium-nudge-cta {
    display: block; width: 100%; margin-top: 14px; padding: 11px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #E8A735, #F0C060); color: #5A3D00; font-size: 0.88rem; font-weight: 800;
    position: relative; z-index: 1; box-shadow: 0 2px 8px rgba(232,167,53,0.3);
  }

  .premium-gate-card {
    background: var(--card); border-radius: 20px; padding: 32px 24px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12); margin-top: 16px;
  }
  .premium-gate-icon { font-size: 2.8rem; margin-bottom: 8px; }
  .premium-gate-title { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .premium-gate-desc { font-size: 0.88rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 20px; }
  .premium-gate-features { text-align: left; margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px; }
  .premium-gate-feat { font-size: 0.84rem; font-weight: 600; color: var(--text); padding: 6px 10px; background: var(--primary-pale); border-radius: 8px; }
  .premium-gate-btn {
    width: 100%; padding: 14px; border: none; border-radius: var(--radius);
    background: linear-gradient(135deg, #E8A735, #F0C060); color: #5A3D00; font-size: 1rem; font-weight: 800;
    box-shadow: 0 4px 12px rgba(232,167,53,0.35);
  }
</style></head><body>
<h3>プレミアムバナー（購入済み）</h3>
<div class="premium-banner">
  <div class="premium-banner-icon">👑</div>
  <div class="premium-banner-text">
    <div class="premium-banner-title">道の駅マスター</div>
    <div class="premium-banner-sub">すべての機能が使えます</div>
  </div>
</div>

<h3>プレミアム訴求（ホーム）</h3>
<div class="premium-nudge">
  <div class="premium-nudge-top">
    <div class="premium-nudge-map">🗾</div>
    <div>
      <div class="premium-nudge-title"><span class="crown">👑</span> 道の駅マスター</div>
      <div class="premium-nudge-sub">全国制覇マップで旅を可視化</div>
    </div>
  </div>
  <div class="premium-nudge-features">
    <span class="premium-nudge-feat">🗾 制覇マップ</span>
    <span class="premium-nudge-feat">🚫 広告なし</span>
    <span class="premium-nudge-feat">📷 写真無制限</span>
    <span class="premium-nudge-feat">📝 旅日記</span>
  </div>
  <button class="premium-nudge-cta">¥980 で道の駅マスターになる</button>
</div>

<h3>プレミアムゲート</h3>
<div class="premium-gate-card">
  <div class="premium-gate-icon">🔒</div>
  <div class="premium-gate-title">プレミアム機能</div>
  <div class="premium-gate-desc">全国制覇マップは<br>有料プランでご利用いただけます</div>
  <div class="premium-gate-features">
    <div class="premium-gate-feat">🗾 都道府県別の訪問率を可視化</div>
    <div class="premium-gate-feat">📊 タップで詳細ステータス表示</div>
    <div class="premium-gate-feat">🏆 制覇県がゴールドに輝く演出</div>
  </div>
  <button class="premium-gate-btn">👑 ¥980 で解放する（買い切り）</button>
</div>
</body></html>
