<!-- @dsCard group="ナビゲーション" -->
<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナビ & タブバー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,"Hiragino Sans",sans-serif; background: #FAFAF8; padding: 20px; max-width: 400px; margin: 0 auto; }
  h3 { font-size: 11px; font-weight: 700; color: #A8A8B0; letter-spacing: 0.1em; margin: 20px 0 10px; }
  h3:first-child { margin-top: 0; }
  .nav-bar {
    height: 56px; background: linear-gradient(135deg, #0F3D28, #1A6B4A);
    display: flex; align-items: center; justify-content: center;
    padding: 0 16px; border-radius: 12px; position: relative;
  }
  .nav-title { font-size: 1.1rem; font-weight: 800; color: #fff; letter-spacing: 0.03em; }
  .nav-premium-badge {
    display: inline-flex; align-items: center; gap: 3px;
    background: linear-gradient(135deg, #D4941F, #E8B040);
    color: #5A3D00; font-size: 0.55rem; font-weight: 800;
    border-radius: 10px; padding: 2px 8px; margin-left: 8px;
  }
  .nav-icon {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; padding: 8px; color: rgba(255,255,255,0.8);
    display: flex; align-items: center; justify-content: center;
  }
  .bottom-tab-bar {
    background: rgba(255,255,255,0.95); border: 0.5px solid rgba(0,0,0,0.12);
    display: flex; align-items: stretch; justify-content: space-around;
    height: 72px; border-radius: 12px; overflow: hidden;
  }
  .btab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; background: none; border: none; cursor: pointer;
    color: #7A7A80; font-size: 0.72rem; font-weight: 600; padding: 8px 0;
  }
  .btab svg { stroke: #7A7A80; }
  .btab.active { color: #1A6B4A; font-weight: 800; }
  .btab.active svg { stroke: #1A6B4A; }
</style></head><body>
<h3>ナビゲーションバー</h3>
<nav class="nav-bar">
  <span class="nav-title">タビクエ<span class="nav-premium-badge">👑 マスター</span></span>
  <button class="nav-icon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
  </button>
</nav>

<h3>タブバー</h3>
<div class="bottom-tab-bar">
  <button class="btab active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    <span>ホーム</span>
  </button>
  <button class="btab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg>
    <span>スタンプ帳</span>
  </button>
  <button class="btab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg>
    <span>マップ</span>
  </button>
  <button class="btab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>一覧</span>
  </button>
  <button class="btab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>統計</span>
  </button>
  <button class="btab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
    <span>実績</span>
  </button>
</div>
</body></html>
