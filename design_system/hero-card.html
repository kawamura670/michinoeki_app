<!-- @dsCard group="コンポーネント" -->
<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヒーローカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,"Hiragino Sans",sans-serif; background: #FAFAF8; padding: 20px; display: flex; justify-content: center; }
  .hero-card {
    background: linear-gradient(145deg, #0F3D28, #1A6B4A, #1F7B55);
    border-radius: 22px; padding: 30px 24px 26px; text-align: center;
    box-shadow: 0 12px 40px rgba(15,61,40,0.25);
    position: relative; overflow: hidden; max-width: 360px; width: 100%;
  }
  .hero-card::before { content:''; position:absolute; top:-40%; right:-20%; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,0.06),transparent 70%); }
  .hero-card::after { content:''; position:absolute; bottom:-30%; left:-15%; width:160px; height:160px; border-radius:50%; background:radial-gradient(circle,rgba(212,148,31,0.08),transparent 70%); }
  .hero-label { font-size:0.72rem; font-weight:700; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.15em; margin-bottom:18px; position:relative; z-index:1; }
  .hero-ring-wrap { position:relative; width:150px; height:150px; margin:0 auto 22px; z-index:1; }
  .hero-ring { width:100%; height:100%; }
  .hero-ring circle:first-child { stroke:rgba(255,255,255,0.12); }
  .hero-ring circle:last-child { stroke:#D4941F; filter:drop-shadow(0 0 6px rgba(212,148,31,0.4)); }
  .hero-pct { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:2.4rem; font-weight:900; color:#fff; }
  .hero-stats { display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }
  .hero-stat { flex:1; display:flex; flex-direction:column; align-items:center; }
  .hero-stat-num { font-size:1.6rem; font-weight:900; color:#fff; }
  .hero-stat-label { font-size:0.7rem; color:rgba(255,255,255,0.5); margin-top:3px; font-weight:600; letter-spacing:0.05em; }
  .hero-stat-divider { width:1px; height:36px; background:rgba(255,255,255,0.15); flex-shrink:0; }
</style></head><body>
<div class="hero-card">
  <div class="hero-label">全国達成率</div>
  <div class="hero-ring-wrap">
    <svg class="hero-ring" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="52" fill="none" stroke="#e8e8e8" stroke-width="10"/>
      <circle cx="60" cy="60" r="52" fill="none" stroke="#D4941F" stroke-width="10" stroke-linecap="round" stroke-dasharray="326.7" stroke-dashoffset="245" transform="rotate(-90 60 60)"/>
    </svg>
    <div class="hero-pct">25%</div>
  </div>
  <div class="hero-stats">
    <div class="hero-stat"><span class="hero-stat-num">308</span><span class="hero-stat-label">スタンプ</span></div>
    <div class="hero-stat-divider"></div>
    <div class="hero-stat"><span class="hero-stat-num">923</span><span class="hero-stat-label">残り</span></div>
    <div class="hero-stat-divider"></div>
    <div class="hero-stat"><span class="hero-stat-num">5</span><span class="hero-stat-label">制覇県</span></div>
  </div>
</div>
</body></html>
