<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="50%" stop-color="#E85D3A"/>
      <stop offset="100%" stop-color="#D44B2E"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: warm sunset gradient -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Sun glow (top right) -->
  <circle cx="380" cy="120" r="120" fill="rgba(255,220,100,0.2)"/>
  <circle cx="380" cy="120" r="60" fill="rgba(255,240,150,0.15)"/>

  <!-- Rolling hills (cute landscape) -->
  <ellipse cx="140" cy="420" rx="200" ry="80" fill="rgba(255,255,255,0.1)"/>
  <ellipse cx="380" cy="440" rx="220" ry="90" fill="rgba(255,255,255,0.08)"/>

  <!-- Road (perspective) -->
  <path d="M220,512 L256,260 L292,512" fill="url(#road)"/>
  <!-- Road center line -->
  <line x1="256" y1="290" x2="256" y2="330" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="350" x2="256" y2="390" stroke="rgba(255,255,255,0.4)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="256" y1="410" x2="256" y2="460" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>

  <!-- Stamp mark (main focal) -->
  <g filter="url(#glow)">
    <circle cx="256" cy="200" r="110" fill="rgba(255,255,255,0.95)" stroke="#fff" stroke-width="4"/>
    <circle cx="256" cy="200" r="95" fill="none" stroke="#E85D3A" stroke-width="3" stroke-dasharray="8,4" opacity="0.6"/>
  </g>

  <!-- Stamp interior: cute car + sparkle -->
  <text x="256" y="195" text-anchor="middle" font-size="72" dominant-baseline="central">🚗</text>
  <!-- Sparkles around stamp -->
  <text x="330" y="130" font-size="28" opacity="0.9">✨</text>
  <text x="170" y="145" font-size="22" opacity="0.7">⭐</text>
  <text x="345" y="230" font-size="20" opacity="0.6">🌟</text>

  <!-- Bottom text -->
  <text x="256" y="490" text-anchor="middle" font-family="-apple-system,'Hiragino Sans',sans-serif" font-size="36" font-weight="900" fill="#fff" opacity="0.95" letter-spacing="4">道の駅</text>
</svg>
