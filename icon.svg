<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E3A"/>
      <stop offset="100%" stop-color="#0D3B24"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8A735"/>
      <stop offset="100%" stop-color="#D4941F"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle texture lines -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
  </g>
  <!-- Stamp circle (outer) -->
  <circle cx="256" cy="240" r="155" fill="none" stroke="#C0392B" stroke-width="8" opacity="0.9"/>
  <circle cx="256" cy="240" r="140" fill="none" stroke="#C0392B" stroke-width="3" opacity="0.6"/>
  <!-- Stamp text: 道の駅 -->
  <text x="256" y="215" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho Pro',serif" font-size="62" font-weight="900" fill="#C0392B" opacity="0.9">道の駅</text>
  <!-- Stamp text: 済 (large) -->
  <text x="256" y="300" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho Pro',serif" font-size="90" font-weight="900" fill="#C0392B" opacity="0.85">済</text>
  <!-- Bottom label -->
  <rect x="136" y="410" width="240" height="42" rx="21" fill="url(#gold)"/>
  <text x="256" y="438" text-anchor="middle" font-family="-apple-system,'Hiragino Sans',sans-serif" font-size="20" font-weight="800" fill="#5A3D00">スタンプ帳</text>
  <!-- Road dots (journey) -->
  <circle cx="120" cy="430" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="100" cy="415" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="85" cy="395" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="392" cy="430" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="412" cy="415" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="427" cy="395" r="3" fill="rgba(255,255,255,0.15)"/>
</svg>
