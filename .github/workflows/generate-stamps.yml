name: Generate Stamp Catalog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate stamp catalog
        run: node scripts/export_stamps.mjs
      - name: Commit catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stamp_catalog.json
          git commit -m "auto: 全1231駅スタンプカタログ生成" || echo "No changes"
          git push
