name: Generate Stamp Images (Free)

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: '一度に生成する枚数'
        default: '200'
      concurrency:
        description: '並列リクエスト数'
        default: '5'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Japanese fonts and sharp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -fv
          npm install sharp

      - name: Generate stamp images
        env:
          BATCH_SIZE: ${{ inputs.batch_size }}
          CONCURRENCY: ${{ inputs.concurrency }}
        run: node scripts/generate_images_free.mjs

      - name: Commit generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stamp_images/ stamp_gen_progress.json
          DONE=$(grep -c '"done"' stamp_gen_progress.json 2>/dev/null || echo 0)
          git commit -m "auto: スタンプ画像生成 (${DONE}/1231枚完了)" || echo "No changes"
          git push
