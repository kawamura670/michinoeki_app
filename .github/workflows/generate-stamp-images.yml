name: Generate Stamp Images (Local SVG - Fast)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sharp
        run: npm install sharp

      - name: Generate all stamps (SVG→PNG, no API)
        run: node scripts/generate_local.mjs

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stamp_images/ stamp_gen_progress.json
          COUNT=$(ls stamp_images/stamp_*.png 2>/dev/null | wc -l)
          git commit -m "auto: 全${COUNT}駅スタンプ画像生成完了 [local SVG]" || echo "No changes"
          git push
